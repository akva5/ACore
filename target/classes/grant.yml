# Группы администраторов (могут выдавать любые привилегии без лимитов)
admin-groups:
  - "admin"

# Настройки групп и их лимитов
# -1 безлимитная выдача привилегии
# group101 - название групп, в моем случаи это с group101 по group111
groups:
  # Группа gattino может выдавать:
  gattino:
    group101: 2  # 2 привилегии в месяц
    group102: 1  # 1 привилегия в месяц

  admin:
    default: -1
    group101: -1
    group102: -1
    group103: -1
    group104: -1
    group105: -1
    group106: -1
    group107: -1
    group108: -1
    group109: -1
    group110: -1
    group111: -1
    mod: -1
    gmod: -1
    op: -1

# Сообщения
messages:
  usage: "&a/grant &7[&aник&7] &7[&aпривилегия&7] &f- Выдать игроку привилегию."
  invalid-donation: "{prefix}&cНеверный тип привилегии! Доступные: &a{available}"
  limit-exceeded: "{prefix}&cВы исчерпали лимит на выдачу &a{donate} &cв этом месяце!"
  grant-success: "{prefix}Вы выдали привилегию &a{donate} &fигроку &e{target}&f."
  grant-receive: "&7\n{prefix}&e{player} &fподарил вам привилегию &a{donate}&f.\n&7"
  error: "{prefix}&cОшибка при выдаче привилегии."