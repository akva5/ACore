lootboxes:
  common:
    displayName: "&aОбычный ящик"
    # Блок, который будет стоять физически
    blockMaterial: CHEST
    # Высота голограммы над блоком
    hologramHeight: 1.6
    # Размер инвентаря
    inventorySize: 27
    # Задержка между взятием предметов в миллисекундах (1000 = 1 сек)
    pickupDelay: 1000
    # Время восстановления лута в секундах (3600 = 1 час)
    refillTime: 3600
    hologramLines:
      - "&a&lОБЫЧНЫЙ ЛУТБОКС"
      - "&fОбновится через: &a{time}"
      - "&eНажми, чтобы открыть"
    # Предметы внутри
    items:
      diamond:
        material: DIAMOND
        name: "&bАлмаз"
        amount: 1
        # Шанс выпадения (в процентах)
        chance: 50.0
      iron:
        material: IRON_INGOT
        amount: 5
        chance: 80.0

  rare:
    displayName: "&6Редкий ящик"
    blockMaterial: ENDER_CHEST
    hologramHeight: 1.6
    inventorySize: 27
    pickupDelay: 1000
    refillTime: 3600
    hologramLines:
      - "&6&lРЕДКИЙ ЛУТБОКС"
      - "&fОбновится через: &a{time}"
      - "&eНажми, чтобы открыть"
    items:
      netherite:
        material: NETHERITE_INGOT
        amount: 1
        chance: 10.0
      gold:
        material: GOLD_INGOT
        amount: 10
        chance: 60.0

locations: {}