customItems:
  example: # Любое название предмета, отображается по подсказкам в команде /citems
    material: "DIAMOND_SWORD" # Айди предмета
    name: "&aКастом меч" # Кастомное имя предмета, поддерживаются HEX цвета
    canBePlaced: true # Можно ли ставить кастом предмет если это голова или блок?
    slots: # Обязательный параметр, не влияет не на что если не добавлены attributes и potionEffects
      attributes: HAND # В каком слоте будут активироваться атрибуты
      effects: OFF_HAND # В каком слоте будут активироваться эффекты
    delay: 1 # Задержка при которой будут применяться эффекты из potionEffects
    lore: # Описание предмета, поддерживаются HEX цвета
      - "&cТекст1"
      - "&6Текст2"
      - "&eТекст3"
    enchantments: # Зачарования предмета https://helpch.at/docs/1.16.5/org/bukkit/enchantments/Enchantment.html
      DAMAGE_ALL: 5
    attributes: # Атрибуты предмета https://helpch.at/docs/1.16.5/org/bukkit/attribute/Attribute.html
      GENERIC_ATTACK_DAMAGE: 10.0
    potionEffects: # Эффекты предмета https://helpch.at/docs/1.16.5/org/bukkit/Effect.html
      SPEED: 1
    hideFlags: # Какие флаги надо скрывать на предмете, скрыть можно только атрибуты и зачарования
      hideAttributes: true
      hideEnchantments: true

  pickaxe:
    material: "NETHERITE_PICKAXE"
    name: "{#c90100}&lШахтёрский Бур"
    slots:
      attributes: HAND
      effects: HAND
    delay: 1
    lore:
      - "&7Эффективность V"
      - "&7Прочность III"
      - "&7Починка"
      - "{#f90000}&l&m━━━━━━━━━━━━━━━━━━━"
      - "{#f9f900}Эта кирка может"
      - "{#f9f900}ломать территорию"
      - "{#f86401}3x3 блоков"
      - "{#f90000}&l&m━━━━━━━━━━━━━━━━━━━"
    enchantments:
      DIG_SPEED: 5
      DURABILITY: 3
      MENDING: 1
    hideFlags:
      hideAttributes: true
      hideEnchantments: true

  chestplate:
    material: "NETHERITE_CHESTPLATE"
    name: "&4☠ {#c90100}Нагрудник хаоса &4☠"
    slots:
      attributes: HAND
      effects: HAND
    delay: 1
    lore: []
    enchantments:
      PROTECTION_EXPLOSIONS: 6
      PROTECTION_FIRE: 6
      MENDING: 1
      PROTECTION_PROJECTILE: 6
      PROTECTION_ENVIRONMENTAL: 6
      DURABILITY: 5
      VANISHING_CURSE: 1
    hideFlags:
      hideAttributes: true
      hideEnchantments: false