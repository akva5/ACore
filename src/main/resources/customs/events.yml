#
# Кастом ивенты к кастом предметам (КОНФИГ ДОКУМЕНТАЦИЯ)
#

# Взаимодействие
events:
  right_click_air:
    type: "PlayerInteractEvent"
    slot: "HAND"
    conditions:
      - "action:RIGHT_CLICK_AIR"
    actions:
      - "execute_command:give_diamond"
    actionParams:
      give_diamond:
        command: "give {player} diamond 1"

  right_click_block:
    type: "PlayerInteractEvent"
    slot: "HAND"
    conditions:
      - "action:RIGHT_CLICK_BLOCK"
    actions:
      - "teleport:location"
    actionParams:
      location:
        location: "100,64,100"

  right_click_block_2:
    type: "PlayerInteractEvent"
    slot: "OFF_HAND"
    conditions:
      - "action:RIGHT_CLICK_BLOCK"
    actions:
      - "spawn_particles:runa_particles"
    actionParams:
      runa_particles:
        type: "CRIT"
        x: 0
        y: 3
        z: 0
        offsetX: 1
        offsetY: 1
        offsetZ: 1
        speed: 1
        count: 30

  left_click_air:
    type: "PlayerInteractEvent"
    slot: "HAND"
    conditions:
      - "action:LEFT_CLICK_AIR"
    actions:
      - "spawn_particles:flame_particles"
    actionParams:
      flame_particles:
        type: "FLAME"
        count: 20

  left_click_block:
    type: "PlayerInteractEvent"
    slot: "HAND"
    conditions:
      - "action:LEFT_CLICK_BLOCK"
    actions:
      - "break_blocks:break_area"
    actionParams:
      break_area:
        radius: 3


  # События времени (автоматически вызываются)
  on_night:
    type: TimeChangeEvent
    slot: ANY
    conditions:
      - is_night:true
    actions:
      - moon_blessing:night_buffs
    actionParams:
      night_buffs:
        night_vision: true
        effects:
          INCREASE_DAMAGE: 2
          REGENERATION: 1
          INVISIBILITY: 1

  on_day:
    type: TimeChangeEvent
    slot: ANY
    conditions:
      - is_day:true
    actions:
      - sun_power:day_buffs
    actionParams:
      day_buffs:
        effects:
          SPEED: 2
          DAMAGE_RESISTANCE: 1


  # События эффектов (автоматически вызываются при наличии эффектов)
  on_positive_effect:
    type: "PotionEffectAddEvent"
    slot: "ANY"
    conditions:
      - "effect_type:POSITIVE"
    actions:
      - "effect_amplifier:boost_positive"
    actionParams:
      boost_positive:
        amplifier_boost: 1

  on_negative_effect:
    type: "PotionEffectAddEvent"
    slot: "ANY"
    conditions:
      - "effect_type:NEGATIVE"
    actions:
      - "effect_cleanse:cleanse_negative"
    actionParams:
      cleanse_negative:
        chance_to_cleanse: 0.5


  # Боевые ивенты
  on_attack:
    type: "EntityDamageByEntityEvent"
    slot: "HAND"
    actions:
      - "lightning_strike:lightning"
    actionParams:
      lightning:
        damage: 5.0

  on_critical_hit:
    type: "EntityDamageByEntityEvent"
    slot: "HAND"
    conditions:
      - "is_critical:true"
    actions:
      - "explosion:small_explosion"
    actionParams:
      small_explosion:
        power: 2.0
        break_blocks: false

  on_kill:
    type: "EntityDeathEvent"
    slot: "HAND"
    conditions:
      - "killer:{player}"
    actions:
      - "summon_mob:zombies"
    actionParams:
      zombies:
        mob_type: "ZOMBIE"
        count: 3

  on_low_health:
    type: "EntityDamageByEntityEvent"
    slot: "ANY"
    conditions:
      - "player_health:<5"
    actions:
      - "apply_effects:low_health_effects"
    actionParams:
      low_health_effects:
        effects:
          REGENERATION: 2
          ABSORPTION: 1


  # Ивенты передвижения
  on_sneak:
    type: "PlayerToggleSneakEvent"
    slot: "ANY"
    conditions:
      - "sneaking:true"
    actions:
      - "invisibility:sneak_invis"
    actionParams:
      sneak_invis:
        duration: 100

  on_sprint:
    type: "PlayerToggleSprintEvent"
    slot: "ANY"
    conditions:
      - "sprinting:true"
    actions:
      - "speed_boost:sprint_boost"
    actionParams:
      sprint_boost:
        amplifier: 2

  on_jump:
    type: "PlayerMoveEvent"
    slot: "ANY"
    conditions:
      - "velocity_y:>0"
    actions:
      - "launch:jump_boost"
    actionParams:
      jump_boost:
        power: 1.5

  on_fall:
    type: "EntityDamageEvent"
    slot: "ANY"
    conditions:
      - "cause:FALL"
    actions:
      - "slow_fall:fall_protection"
    actionParams:
      fall_protection:
        duration: 100


  # Ивенты инвентаря и экипировки
  on_equip:
    type: "PlayerItemHeldEvent"
    slot: "HAND"
    actions:
      - "apply_attributes:equip_attributes"
    actionParams:
      equip_attributes:
        attributes:
          GENERIC_MAX_HEALTH: 10
          GENERIC_ATTACK_DAMAGE: 5

  on_unequip:
    type: "PlayerDropItemEvent"
    slot: "HAND"
    actions:
      - "remove_attributes:remove_attrs"
    actionParams:
      remove_attrs:
        attributes:
          - "GENERIC_MAX_HEALTH"
          - "GENERIC_ATTACK_DAMAGE"

  on_hold:
    type: "PlayerItemHeldEvent"
    slot: "HAND"
    actions:
      - "night_vision:hold_night_vision"
    actionParams:
      hold_night_vision:
        duration: 200

  on_drop:
    type: "PlayerDropItemEvent"
    slot: "HAND"
    actions:
      - "explosion:drop_explosion"
    actionParams:
      drop_explosion:
        power: 3.0


  # Ивенты блоков
  on_block_place:
    type: "BlockPlaceEvent"
    slot: "HAND"
    actions:
      - "fill_area:obsidian_area"
    actionParams:
      obsidian_area:
        material: "OBSIDIAN"
        radius: 2

  on_block_break:
    type: "BlockBreakEvent"
    slot: "HAND"
    actions:
      - "drop_experience:break_exp"
    actionParams:
      break_exp:
        experience: 10
        multiply_drops: true

  on_farmland_trample:
    type: "PlayerInteractEvent"
    slot: "ANY"
    conditions:
      - "block:FARMLAND"
    actions:
      - "restore_farmland:restore_farm"
    actionParams:
      restore_farm:
        restore_speed: 5


  # Ивенты окружающей среды
  on_enter_water:
    type: "PlayerMoveEvent"
    slot: "ANY"
    conditions:
      - "in_water:true"
    actions:
      - "water_breathing:water_breath"
    actionParams:
      water_breath:
        duration: 100

  on_enter_lava:
    type: "PlayerMoveEvent"
    slot: "ANY"
    conditions:
      - "in_lava:true"
    actions:
      - "fire_resistance:lava_resist"
    actionParams:
      lava_resist:
        duration: 200

  on_rain:
    type: "WeatherChangeEvent"
    slot: "ANY"
    conditions:
      - "raining:true"
    actions:
      - "lightning_immunity:rain_immunity"
    actionParams:
      rain_immunity:
        duration: 300

  on_thunder:
    type: "LightningStrikeEvent"
    slot: "ANY"
    actions:
      - "charge_item:thunder_charge"
    actionParams:
      thunder_charge:
        enchantments:
          SHARPNESS: 3


  # Ивенты крафта и зельек
  on_craft:
    type: "CraftItemEvent"
    slot: "ANY"
    actions:
      - "bonus_craft:craft_bonus"
    actionParams:
      craft_bonus:
        multiplier: 2
        extra_items:
          DIAMOND: 1

  on_smith:
    type: "PrepareAnvilEvent"
    slot: "ANY"
    actions:
      - "upgrade_item:smith_upgrade"
    actionParams:
      smith_upgrade:
        preserve_enchantments: true
        discount: 0.5

  on_brew:
    type: "BrewEvent"
    slot: "ANY"
    actions:
      - "enhance_potion:brew_enhance"
    actionParams:
      brew_enhance:
        amplifier_boost: 1
        duration_boost: 2.0


  # Рыбалка
  on_fish:
    type: "PlayerFishEvent"
    slot: "HAND"
    actions:
      - "treasure_fishing:fish_treasure"
    actionParams:
      fish_treasure:
        treasure_chance: 0.3
        junk_chance: 0.1

  on_fish_bite:
    type: "PlayerFishEvent"
    slot: "HAND"
    conditions:
      - "state:CAUGHT_FISH"
    actions:
      - "auto_reel:fish_auto_reel"
    actionParams:
      fish_auto_reel:
        instant_catch: true


  # Еда и голод
  on_eat:
    type: "PlayerItemConsumeEvent"
    slot: "HAND"
    actions:
      - "bonus_effects:eat_effects"
    actionParams:
      eat_effects:
        effects:
          SATURATION: 2
          HEALTH_BOOST: 1

  on_starve:
    type: "FoodLevelChangeEvent"
    slot: "ANY"
    conditions:
      - "food_level:<6"
    actions:
      - "auto_feed:starve_feed"
    actionParams:
      starve_feed:
        restore_amount: 10


  # Опыт
  on_exp_gain:
    type: "PlayerExpChangeEvent"
    slot: "ANY"
    actions:
      - "exp_multiplier:exp_boost"
    actionParams:
      exp_boost:
        multiplier: 1.5

  on_level_up:
    type: "PlayerLevelChangeEvent"
    slot: "ANY"
    conditions:
      - "level_change:>0"
    actions:
      - "reward_level:level_rewards"
    actionParams:
      level_rewards:
        rewards:
          - "give {player} diamond 1"
          - "effect {player} REGENERATION 30 1"


  # Порталы
  on_nether_portal:
    type: "PlayerPortalEvent"
    slot: "ANY"
    actions:
      - "safe_teleport:nether_safe"
    actionParams:
      nether_safe:
        prevent_ghast_spawn: true
        fire_resistance: 60

  on_end_portal:
    type: "PlayerPortalEvent"
    slot: "ANY"
    conditions:
      - "destination:THE_END"
    actions:
      - "dragon_buff:end_buff"
    actionParams:
      end_buff:
        strength: 2
        resistance: 1


  # Редстоун
  on_redstone_activate:
    type: "BlockRedstoneEvent"
    slot: "ANY"
    actions:
      - "power_beam:redstone_beam"
    actionParams:
      redstone_beam:
        range: 10
        damage: 3.0

  on_redstone_pulse:
    type: "BlockRedstoneEvent"
    slot: "ANY"
    conditions:
      - "power:15"
    actions:
      - "chain_lightning:redstone_lightning"
    actionParams:
      redstone_lightning:
        chain_count: 5


  # Чары
  on_enchant:
    type: "EnchantItemEvent"
    slot: "ANY"
    actions:
      - "bonus_enchant:enchant_bonus"
    actionParams:
      enchant_bonus:
        bonus_levels: 5

  on_combine:
    type: "PrepareAnvilEvent"
    slot: "ANY"
    actions:
      - "preserve_enchant:combine_preserve"
    actionParams:
      combine_preserve:
        no_penalty: true
        max_cost: 10


  # Монстры
  on_zombie_kill:
    type: "EntityDeathEvent"
    slot: "HAND"
    conditions:
      - "entity_type:ZOMBIE"
    actions:
      - "zombie_army:zombie_spawn"
    actionParams:
      zombie_spawn:
        spawn_count: 3
        duration: 60

  on_creeper_explode:
    type: "ExplosionPrimeEvent"
    slot: "ANY"
    conditions:
      - "entity_type:CREEPER"
    actions:
      - "absorb_explosion:creeper_absorb"
    actionParams:
      creeper_absorb:
        convert_to_health: true


  # Животные
  on_animal_breed:
    type: "EntityBreedEvent"
    slot: "ANY"
    actions:
      - "instant_growth:breed_growth"
    actionParams:
      breed_growth:
        instant_adult: true
        extra_breeding: true

  on_animal_tame:
    type: "EntityTameEvent"
    slot: "ANY"
    actions:
      - "super_pet:tame_pet"
    actionParams:
      tame_pet:
        max_health: 100
        attack_damage: 10


  # Полет
  on_elytra_boost:
    type: "PlayerToggleFlightEvent"
    slot: "ANY"
    actions:
      - "rocket_boost:elytra_rocket"
    actionParams:
      elytra_rocket:
        power: 3.0
        duration: 40

  on_fall_flying:
    type: "EntityToggleGlideEvent"
    slot: "ANY"
    conditions:
      - "is_gliding:true"
    actions:
      - "air_strike:glide_strike"
    actionParams:
      glide_strike:
        damage: 5.0
        radius: 3.0


  # Команды
  on_command:
    type: "PlayerCommandPreprocessEvent"
    slot: "ANY"
    conditions:
      - "command:/home"
    actions:
      - "command_boost:home_boost"
    actionParams:
      home_boost:
        instant_teleport: true
        no_cooldown: true

  on_special_command:
    type: "PlayerCommandPreprocessEvent"
    slot: "ANY"
    conditions:
      - "command:/powerup"
    actions:
      - "custom_effect:powerup_effects"
    actionParams:
      powerup_effects:
        effects:
          JUMP_BOOST: 3
          SPEED: 2


  # Чат
  on_chat_message:
    type: "AsyncPlayerChatEvent"
    slot: "ANY"
    conditions:
      - "message:abracadabra"
    actions:
      - "magic_words:magic_effects"
    actionParams:
      magic_effects:
        effects:
          LEVITATION: 1
          GLOWING: 1

  on_emote:
    type: "PlayerAnimationEvent"
    slot: "ANY"
    actions:
      - "visual_effects:emote_effects"
    actionParams:
      emote_effects:
        particles: true
        sounds: true


  # Пвп
  on_pvp_kill:
    type: "PlayerDeathEvent"
    slot: "HAND"
    conditions:
      - "killer_type:PLAYER"
    actions:
      - "bounty_hunter:pvp_reward"
    actionParams:
      pvp_reward:
        reward:
          - "give {killer} diamond 5"
          - "broadcast &c{killer} победил {player}!"

  on_pvp_death:
    type: "PlayerRespawnEvent"
    slot: "ANY"
    conditions:
      - "last_damage_cause:ENTITY_ATTACK"
    actions:
      - "revenge:pvp_revenge"
    actionParams:
      pvp_revenge:
        effects:
          STRENGTH: 1
          SPEED: 1


  # Телепортация
  on_teleport:
    type: "PlayerTeleportEvent"
    slot: "ANY"
    actions:
      - "dimensional_anchor:teleport_anchor"
    actionParams:
      teleport_anchor:
        prevent_void_death: true
        safe_location: true

  on_ender_pearl:
    type: "PlayerTeleportEvent"
    slot: "ANY"
    conditions:
      - "cause:ENDER_PEARL"
    actions:
      - "no_damage:pearl_no_damage"
    actionParams:
      pearl_no_damage:
        no_fall_damage: true


  # Ресурсные пакеты
  on_custom_sound:
    type: "PlayerInteractEvent"
    slot: "HAND"
    actions:
      - "play_custom_sound:magic_sound"
    actionParams:
      magic_sound:
        sound_file: "custom_magic.ogg"
        volume: 1.0

  on_custom_model:
    type: "PlayerItemHeldEvent"
    slot: "HAND"
    actions:
      - "change_model:custom_model"
    actionParams:
      custom_model:
        model_data: 12345


  # Комбо
  on_combo_3:
    type: "EntityDamageByEntityEvent"
    slot: "HAND"
    conditions:
      - "combo_count:3"
    actions:
      - "combo_attack:combo_3_attack"
    actionParams:
      combo_3_attack:
        damage_multiplier: 1.5

  on_combo_5:
    type: "EntityDamageByEntityEvent"
    slot: "HAND"
    conditions:
      - "combo_count:5"
    actions:
      - "ultimate_attack:combo_5_attack"
    actionParams:
      combo_5_attack:
        area_damage: true
        radius: 5.0


  # Праздники
  on_christmas:
    type: "PlayerJoinEvent"
    slot: "ANY"
    conditions:
      - "month:12"
    actions:
      - "gift_drop:christmas_gift"
    actionParams:
      christmas_gift:
        gift_chance: 0.1

  on_halloween:
    type: "EntitySpawnEvent"
    slot: "ANY"
    conditions:
      - "month:10"
    actions:
      - "scary_mobs:halloween_scary"
    actionParams:
      halloween_scary:
        special_mobs: true